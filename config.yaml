languageCode: "en-us"
title: "David Nguyen's Personal Blog"
theme: "gradient-flow"

pagination:
  pagerSize: 10

enableRobotsTXT: true

# Skip building these files
ignoreFiles: ["content/404.md"]

# Enable Hugo Emoji Conversion
enableEmoji: true

params:
  # Favicon for site
  favicon: "images/favicon.ico"

  # Disqus shortname for comments
  disqusShortname: "pnguyen"

  # Dark Tech Theme Colors
  primaryColor: "#00b4d8"
  secondaryColor: "#1a1a1a"
  tertiaryColor: "#0d1117"
  textColor: "#ffffff"

  # Typography
  fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  codeFont: "'SF Mono', Monaco, 'Cascadia Code', monospace"

  # Background blur for glassmorphism effect
  backgroundBlur: "rgba(19, 84, 122, 0.3)"

  author:
    name: "David Nguyen"
    description: "Just a regular developer who's passionate about crafting high quality software, a martial arts practitioner, a proud dad of two sons."
    avatar: "https://www.gravatar.com/avatar/624eb530503fe6117f4b4b5ad3acf062?s=150"

  # Social media links
  social:
    github: "hpcsc"
    linkedin: "davidphuongnguyen"

  # Custom CSS files (optional)
  # customCSS: ["/css/highlight.css", "/css/list.css"]

# Taxonomies configuration
taxonomies:
  category: "categories"
  tag: "tags"

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    style: onedark
    noClasses: true
    codeFences: true
    lineNos: true
    lineNumbersInTable: false

# Menu configuration
menu:
  main:
    - name: "Home"
      url: "/"
      weight: 10
    - name: "Categories"
      url: "/categories/"
      weight: 20
    - name: "Tags"
      url: "/tags/"
      weight: 30
